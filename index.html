function localSearch(q){
  const w=q.toLowerCase().split(" ").filter(Boolean);
  return LOCAL_DB.filter(l=>w.some(x=>l.titulo.toLowerCase().includes(x)||l.artista.toLowerCase().includes(x)));
}

/* ── Busca YouTube via oEmbed (sem API key, sem CORS) ── */
async function ytSearch(q){
  // Tenta YouTube Data API primeiro
  try{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q+" louvor gospel")}&type=video&maxResults=8&key=${YT_API_KEY}&regionCode=BR`);
    const d=await r.json();
    if(d.items&&d.items.length){
      return d.items.map(it=>({
        titulo:it.snippet.title,
        artista:it.snippet.channelTitle,
        ytId:it.id.videoId,
        ytUrl:"https://www.youtube.com/watch?v="+it.id.videoId,
        tom:"",cifra:"",obs:""
      }));
    }
  }catch(e){}
  // Fallback: banco local
  const loc=localSearch(q);
  if(loc.length) return loc.map(l=>({...l,ytId:getYTId(l.ytUrl),obs:""}));
  return [];
}

const TomTag=({tom})=>{const a=getAccent();return tom?<span style={{fontSize:10,fontWeight:700,color:a.accent,background:`rgba(${a.rgb},0.12)`,borderRadius:6,padding:"2px 7px",letterSpacing:.5}}>{tom}</span>:null;};
const emojiClass=(instrumento,emoji)=>{
  if(!instrumento&&!emoji) return "emoji-default";
  const s=(instrumento||"").toLowerCase();
  if(s.includes("bater")||s.includes("drum")) return "emoji-drum";
  if(s.includes("guitar")||s.includes("viola")||s.includes("baixo")||s.includes("contra")) return s.includes("baixo")||s.includes("contra")?"emoji-bass":"emoji-guitar";
  if(s.includes("teclado")||s.includes("piano")||s.includes("key")) return "emoji-keys";
  if(s.includes("voz")||s.includes("vocal")||s.includes("cant")) return "emoji-singer";
  const e=emoji||"";
  if(["🥁","🪘"].some(x=>e.includes(x))) return "emoji-drum";
  if(["🎸","🪕","🎻"].some(x=>e.includes(x))) return "emoji-guitar";
  if(["🎹","🎛","🎚"].some(x=>e.includes(x))) return "emoji-keys";
  if(["🎤","🎧","🎙"].some(x=>e.includes(x))) return "emoji-singer";
  if(["🎵","🎶"].some(x=>e.includes(x))) return "emoji-bass";
  return "emoji-default";
};

function DatePicker({label,value,onChange}){
  const [open,setOpen]=React.useState(false);
  const MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const DAYS=["D","S","T","Q","Q","S","S"];
  const parsed=value?new Date(value+"T00:00"):new Date();
  const [view,setView]=React.useState({y:parsed.getFullYear(),m:parsed.getMonth()});
  const sel=value||"";

  const cells=()=>{
    const{y,m}=view;
    const first=new Date(y,m,1).getDay();
    const total=new Date(y,m+1,0).getDate();
    const arr=[];
    for(let i=0;i<first;i++) arr.push(null);
    for(let d=1;d<=total;d++) arr.push(d);
    return arr;
  };
  const toStr=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const today=toStr(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  const fmtDisp=v=>{ if(!v)return "Selecionar data"; const[y,m,d]=v.split("-"); return `${d}/${m}/${y}`; };

  return(
    <div style={{marginBottom:12,position:"relative"}}>
      {label&&<label style={{fontSize:10,letterSpacing:1.5,color:getAccent().light_theme?"rgba(0,0,0,0.42)":"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:5}}>{label}</label>}
      <button onClick={()=>setOpen(p=>!p)} style={{width:"100%",background:getAccent().light_theme?"rgba(0,0,0,0.04)":"rgba(255,255,255,0.05)",border:getAccent().light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 13px",color:sel?getAccent().text:getAccent().light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",fontSize:14,fontFamily:"inherit",outline:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",textAlign:"left"}}>
        <span>📅 {fmtDisp(sel)}</span>
        <span style={{color:getAccent().light_theme?"rgba(107,53,184,0.6)":"rgba(255,255,255,0.3)",fontSize:12,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:300,background:getAccent().bgCard,border:"1px solid rgba(255,255,255,0.12)",borderRadius:14,padding:14,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
          {/* Nav mês */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <button onClick={()=>setView(p=>{ const d=new Date(p.y,p.m-1,1); return{y:d.getFullYear(),m:d.getMonth()}; })} style={{background:getAccent().light_theme?"rgba(0,0,0,0.05)":"rgba(255,255,255,0.06)",border:getAccent().light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)",color:getAccent().light_theme?"#1A1028":getAccent().text,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>‹</button>
            <span style={{fontSize:13,fontWeight:600,color:getAccent().light_theme?"#1A1028":getAccent().text}}>{MONTHS[view.m]} {view.y}</span>
            <button onClick={()=>setView(p=>{ const d=new Date(p.y,p.m+1,1); return{y:d.getFullYear(),m:d.getMonth()}; })} style={{background:getAccent().light_theme?"rgba(0,0,0,0.05)":"rgba(255,255,255,0.06)",border:getAccent().light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)",color:getAccent().light_theme?"#1A1028":getAccent().text,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>›</button>
          </div>
          {/* Dias da semana */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
            {DAYS.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:getAccent().light_theme?"rgba(107,53,184,0.6)":"rgba(255,255,255,0.3)",fontWeight:600,padding:"2px 0"}}>{d}</div>)}
          </div>
          {/* Células */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {cells().map((d,i)=>{
              if(!d) return <div key={i}/>;
              const ds=toStr(view.y,view.m,d);
              const isSel=ds===sel;
              const isToday=ds===today;
              return(
                <button key={i} onClick={()=>{ onChange({target:{value:ds}}); setOpen(false); }} style={{padding:"7px 0",borderRadius:8,border:isSel?`1px solid rgba(${getAccent().rgb},0.6)`:isToday?`1px solid ${getAccent().light_theme?"rgba(0,0,0,0.2)":"rgba(255,255,255,0.15)"}`:"1px solid transparent",background:isSel?`rgba(${getAccent().rgb},0.15)`:isToday?getAccent().light_theme?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.06)":"transparent",color:isSel?getAccent().accent:isToday?getAccent().text:getAccent().light_theme?"rgba(0,0,0,0.6)":"rgba(255,255,255,0.7)",fontSize:12,fontWeight:isSel||isToday?700:400,cursor:"pointer",fontFamily:"inherit",transition:"all 0.1s"}}>
                  {d}
                </button>
              );
            })}
          </div>
          {/* Hoje */}
          <button onClick={()=>{ onChange({target:{value:today}}); setOpen(false); }} style={{width:"100%",marginTop:10,background:getAccent().light_theme?"rgba(0,0,0,0.03)":"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:getAccent().light_theme?"rgba(0,0,0,0.5)":"rgba(255,255,255,0.5)",fontSize:11,padding:"6px",cursor:"pointer",fontFamily:"inherit"}}>Hoje</button>
        </div>
      )}
    </div>
  );
}

/* ── Render Cifra com acordes coloridos ── */
function renderCifra(texto,accent){
  const corAcorde=accent.accent;
  const corLetra=accent.text;
  // Regex para detectar acordes: C, Dm, G#m, Bb7, F/C, etc.
  const reAcorde=/^[A-G][#b]?(m|maj|min|dim|aug|sus|add)?[0-9]?(\/[A-G][#b]?)?$/;
  const isAcordeLine=line=>{
    const tokens=line.trim().split(/\s+/).filter(Boolean);
    if(!tokens.length)return false;
    const hits=tokens.filter(t=>reAcorde.test(t));
    return hits.length/tokens.length>=0.5;
  };
  return texto.split("\n").map((line,li)=>{
    if(isAcordeLine(line)){
      // Divide por espaços mantendo espaços, colore cada acorde
      const parts=line.split(/(\S+)/g).map((part,pi)=>{
        if(reAcorde.test(part.trim())&&part.trim()!==""){
          return React.createElement("span",{key:pi,style:{color:corAcorde,fontWeight:700}},part);
        }
        return React.createElement("span",{key:pi,style:{color:corLetra}},part);
      });
      return React.createElement("span",{key:li,style:{display:"block"}},[...parts,"\n"]);
    }
    return React.createElement("span",{key:li,style:{display:"block",color:corLetra}},line+"\n");
  });
}

/* ── Cifra Popup ── */
function CifraPopup({louvor,onClose}){
  const accent=getAccent();
  const [scrolling,setScrolling]=React.useState(false);
  const [vel,setVel]=React.useState(40);
  const divRef=React.useRef(null);
  const rafRef=React.useRef(null);
  const lastRef=React.useRef(null);

  function tick(ts){
    const el=divRef.current;
    if(!el)return;
    if(lastRef.current!==null){
      el.scrollTop+=vel*((ts-lastRef.current)/1000);
      if(el.scrollTop+el.clientHeight>=el.scrollHeight-2){
        setScrolling(false);
        lastRef.current=null;
        return;
      }
    }
    lastRef.current=ts;
    rafRef.current=requestAnimationFrame(tick);
  }

  React.useEffect(function(){
    if(scrolling){
      lastRef.current=null;
      rafRef.current=requestAnimationFrame(tick);
    } else {
      cancelAnimationFrame(rafRef.current);
    }
    return function(){ cancelAnimationFrame(rafRef.current); };
  },[scrolling,vel]);

  return(
    <div onClick={function(e){if(e.target===e.currentTarget)onClose();}}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:300,display:"flex",flexDirection:"column"}}>
      <div style={{background:accent.bgCard,borderRadius:"20px 20px 0 0",marginTop:"auto",maxHeight:"92vh",display:"flex",flexDirection:"column",width:"100%",maxWidth:700,marginLeft:"auto",marginRight:"auto"}}>
        <div style={{padding:"16px",borderBottom:"1px solid "+accent.border,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:700,color:accent.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{"𝄞 "+louvor.titulo}</div>
            {louvor.artista&&<div style={{fontSize:11,color:accent.textSub,marginTop:2}}>{louvor.artista}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            {scrolling&&<div style={{display:"flex",alignItems:"center",gap:5}}>
              <button onClick={function(){setVel(function(v){return Math.max(5,v-10);});}}
                style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:accent.text,borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:16,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>{"−"}</button>
              <span style={{fontSize:10,color:accent.textSub,minWidth:24,textAlign:"center"}}>{vel}</span>
              <button onClick={function(){setVel(function(v){return Math.min(200,v+10);});}}
                style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:accent.text,borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:16,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>{"+"}</button>
            </div>}
            <button onClick={function(){setScrolling(function(s){return !s;});}}
              style={{background:scrolling?"rgba("+accent.rgb+",0.2)":"rgba(255,255,255,0.08)",border:scrolling?"1px solid rgba("+accent.rgb+",0.5)":"1px solid rgba(255,255,255,0.12)",color:scrolling?accent.accent:accent.textSub,borderRadius:10,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              {scrolling?"⏸ Parar":"▶ Auto"}
            </button>
            <button onClick={onClose}
              style={{background:"rgba(255,255,255,0.06)",border:"none",color:"rgba(255,255,255,0.5)",borderRadius:"50%",width:30,height:30,cursor:"pointer",fontSize:16,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>{"✕"}</button>
          </div>
        </div>
        <div ref={divRef} style={{overflowY:"auto",flex:1,padding:"16px 20px"}}>
          <pre style={{margin:0,fontFamily:"'Courier New',monospace",fontSize:14,lineHeight:1.9,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
              {renderCifra(louvor.cifra||"",accent)}
            </pre>
          <div style={{height:80}}/>
        </div>
      </div>
    </div>
  );
}

                        </div>
                        {on&&<span>✓</span>}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Louvores */}
              <div style={{background:accent.bgCard,border:`1px solid rgba(${accent.rgb},0.25)`,borderRadius:14,padding:16,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:getAccent().light_theme?"#1A1028":accent.text}}>🎵 Louvores</div>
                  <div style={{display:"flex",gap:6}}>
                    {canEdit&&<button style={{...bGhost,padding:"5px 10px",fontSize:11}} onClick={()=>setFavPk(true)}>★ Favs</button>}
                    {canEdit&&<button style={{...bGold,padding:"5px 12px",fontSize:11}} onClick={()=>setNLF({titulo:"",artista:"",ytUrl:"",tom:"",cifra:"",obs:""})}>+ Louvor</button>}
                  </div>
                </div>
                {c.louvores.length===0&&<p style={{color:getAccent().light_theme?"rgba(0,0,0,0.30)":"rgba(255,255,255,0.25)",fontSize:12,fontStyle:"italic"}}>Nenhum louvor adicionado</p>}
                {c.louvores.map((l,i)=>{
                  const isOpen=openLouvor===l.id;
                  const vidOpen=openLouvor===("vid_"+l.id);
                  const escaladosCulto=musicos.filter(mt=>(c.musicos||[]).includes(mt.nome));
                  const listaMus=escaladosCulto.length>0?escaladosCulto:musicos;
                  const selMus=l.musicos||[];

                  // Transpose
                  const TONS_MAJ=["C","C#","Db","D","D#","Eb","E","F","F#","Gb","G","G#","Ab","A","A#","Bb","B"];
                  const TONS_MIN=["Cm","C#m","Dbm","Dm","D#m","Ebm","Em","Fm","F#m","Gbm","Gm","G#m","Abm","Am","A#m","Bbm","Bm"];
                  const tomAtual=transposeMap[l.id]||l.tom||"";
                  const isMin=tomAtual.endsWith("m");
                  const lista=isMin?TONS_MIN:TONS_MAJ;
                  const idxAtual=lista.indexOf(tomAtual);
                  const transpor=delta=>{
                    if(!tomAtual)return;
                    const novoIdx=(idxAtual+delta+lista.length)%lista.length;
                    setTransposeMap(p=>({...p,[l.id]:lista[novoIdx]}));
                  };
                  const tomMudou=tomAtual&&tomAtual!==l.tom;

                  const toggleMusLouvor=nome=>{
                    const nova=selMus.includes(nome)?selMus.filter(n=>n!==nome):[...selMus,nome];
                    const cult=getC(c.id); if(!cult)return;
                    if(canEdit)updC({...cult,louvores:cult.louvores.map(x=>x.id===l.id?{...x,musicos:nova}:x)});
                  };
                  const salvar=()=>{
                    if(tomMudou){
                      const cult=getC(c.id); if(!cult)return;
                      updC({...cult,louvores:cult.louvores.map(x=>x.id===l.id?{...x,tom:tomAtual}:x)});
                    }
                    showToast("Salvo ✓");
                    setOpenLouvor(null);
                  };

                  return(
                    <div key={l.id} style={{borderBottom:accent.light_theme?`1px solid rgba(${accent.rgb},0.08)`:"1px solid rgba(255,255,255,0.06)",overflow:"hidden"}}>
                      {/* Linha clicável */}
                      <div
                        draggable
                        onDragStart={e=>{ e.dataTransfer.setData("louvorIdx",String(i)); e.dataTransfer.setData("cultoId",c.id); }}
                        onDragOver={e=>e.preventDefault()}
                        onDrop={e=>{ e.preventDefault(); const from=parseInt(e.dataTransfer.getData("louvorIdx")); const cid=e.dataTransfer.getData("cultoId"); if(cid!==c.id||from===i)return; const cult=getC(c.id); if(!cult)return; const arr=[...cult.louvores]; const [moved]=arr.splice(from,1); arr.splice(i,0,moved); updC({...cult,louvores:arr}); }}
                        onClick={()=>{ setOpenLouvor(isOpen?null:l.id); if(!isOpen) setTransposeMap(p=>({...p,[l.id]:l.tom||""})); }}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",cursor:"pointer",background:isOpen?`rgba(${accent.rgb},0.07)`:"transparent",borderLeft:`3px solid ${isOpen?accent.accent:"transparent"}`,transition:"all 0.15s",borderRadius:isOpen?"0 8px 8px 0":"0"}}>
                        {/* Número + drag */}
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,flexShrink:0,minWidth:20}}>
                          <span style={{fontSize:10,fontWeight:700,color:isOpen?accent.accent:accent.light_theme?"rgba(0,0,0,0.3)":"rgba(255,255,255,0.25)",lineHeight:1}}>{i+1}</span>
                          <span style={{color:accent.light_theme?"rgba(0,0,0,0.18)":"rgba(255,255,255,0.15)",fontSize:12,cursor:"grab",lineHeight:1}}>⠿</span>
                        </div>
                        {/* Info principal */}
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:accent.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:3}}>{l.titulo}</div>
                          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                            {l.cantor&&<span style={{fontSize:11,color:accent.accent,fontWeight:600,display:"flex",alignItems:"center",gap:2}}><span style={{fontSize:10}}>🎤</span>{l.cantor}</span>}
                            {l.artista&&!l.cantor&&<span style={{fontSize:11,color:accent.light_theme?"rgba(0,0,0,0.45)":"rgba(255,255,255,0.4)"}}>{l.artista}</span>}
                            {selMus.length>0&&<span style={{fontSize:10,color:accent.light_theme?"rgba(107,77,160,0.7)":"rgba(107,191,163,0.8)",display:"flex",gap:3,flexWrap:"wrap"}}>
                              {selMus.map(nm=>{const mt=musicos.find(m=>m.nome===nm); return <span key={nm}>{mt?mt.emoji:""}</span>;})}
                            </span>}
                          </div>
                        </div>
                        {/* Tom + ações */}
                        <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                          <TomTag tom={l.tom}/>
                          {getYTId(l.ytUrl||"")&&(
                            <button onClick={e=>{e.stopPropagation();setOpenLouvor(vidOpen?null:"vid_"+l.id);}}
                              style={{width:28,height:28,borderRadius:"50%",background:vidOpen?"rgba(204,0,0,0.3)":"rgba(204,0,0,0.15)",border:"1px solid rgba(204,0,0,0.3)",color:"#ff6b6b",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                              {vidOpen?"■":"▶"}
                            </button>
                          )}
                          {l.cifra&&(
                            <button onClick={e=>{e.stopPropagation();setCifraAberta(l);setCifraScroll(false);}}
                              style={{width:28,height:28,borderRadius:"50%",background:`rgba(${accent.rgb},0.15)`,border:`1px solid rgba(${accent.rgb},0.35)`,color:accent.accent,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}
                              title="Ver cifra">
                              𝄞
                            </button>
                          )}
                          <button onClick={e=>{e.stopPropagation();if(canEdit)setELF({cultoId:c.id,louvorId:l.id,louvor:{...l}});}}
                            style={{width:28,height:28,borderRadius:"50%",background:accent.light_theme?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.07)",border:accent.light_theme?"1px solid rgba(0,0,0,0.1)":"1px solid rgba(255,255,255,0.1)",color:accent.light_theme?"rgba(0,0,0,0.45)":"rgba(255,255,255,0.45)",fontSize:12,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✎</button>
                          <button onClick={e=>{e.stopPropagation();if(canEdit)askConfirm("Remover este louvor da escala?",()=>doRemLouvor(c.id,l.id));}}

                        </div>
                      </div>

                      {/* Player inline */}
                      {vidOpen&&getYTId(l.ytUrl||"")&&(

                            <button onClick={()=>setPlayerTranspose(p=>p-1)} style={{background:accent.light_theme?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.08)",border:accent.light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)",color:getAccent().light_theme?"#1A1028":accent.text,borderRadius:8,width:32,height:32,fontSize:18,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                            <div style={{textAlign:"center",flex:1}}>
                              <div style={{fontSize:20,fontWeight:700,color:playerTranspose!==0?accent.accent:"rgba(255,255,255,0.4)",lineHeight:1}}>{playerTranspose>0?"+"+playerTranspose:playerTranspose}</div>
                              <div style={{fontSize:9,color:getAccent().light_theme?"rgba(0,0,0,0.30)":"rgba(255,255,255,0.25)",textTransform:"uppercase",letterSpacing:1}}>{playerTranspose!==0?(playerTranspose>0?"semitons acima":"semitons abaixo"):"tom original"}</div>
                              {l.tom&&<div style={{fontSize:10,color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)"}}>ref: <span style={{color:accent.accent,fontWeight:700}}>{l.tom}</span></div>}
                            </div>
                            <button onClick={()=>setPlayerTranspose(p=>p+1)} style={{background:accent.light_theme?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.08)",border:accent.light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)",color:getAccent().light_theme?"#1A1028":accent.text,borderRadius:8,width:32,height:32,fontSize:18,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                            {playerTranspose!==0&&<button onClick={()=>setPlayerTranspose(0)} style={{background:"none",border:"none",color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>↺</button>}
                          </div>
                        </div>
                      )}

                      {/* Painel expandido */}
                      {isOpen&&(
                        <div style={{padding:"10px 0 14px 22px",borderTop:accent.light_theme?`1px solid rgba(${accent.rgb},0.1)`:"1px solid rgba(255,255,255,0.06)"}}>

                          {/* Transpose */}
                          {l.tom&&(
                            <div style={{marginBottom:14}}>
                              <div style={{fontSize:9,letterSpacing:1.5,color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",textTransform:"uppercase",marginBottom:8}}>🎵 Tom / Transpose</div>
                              <div style={{display:"flex",alignItems:"center",gap:10}}>
                                <button onClick={()=>transpor(-1)} style={{background:accent.light_theme?"rgba(0,0,0,0.05)":"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",color:getAccent().light_theme?"#1A1028":accent.text,borderRadius:10,width:36,height:36,fontSize:18,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                                <div style={{flex:1,textAlign:"center"}}>
                                  <div style={{fontSize:24,fontWeight:700,color:tomMudou?accent.accent:accent.text,letterSpacing:1}}>{tomAtual||"—"}</div>
                                  {tomMudou&&<div style={{fontSize:10,color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)"}}>original: {l.tom}</div>}
                                </div>
                                <button onClick={()=>transpor(+1)} style={{background:accent.light_theme?"rgba(0,0,0,0.05)":"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",color:getAccent().light_theme?"#1A1028":accent.text,borderRadius:10,width:36,height:36,fontSize:18,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                              </div>
                              {tomMudou&&(
                                <button onClick={()=>setTransposeMap(p=>({...p,[l.id]:l.tom}))} style={{width:"100%",marginTop:6,background:"none",border:"none",color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",fontSize:11,cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
                                  ↺ Voltar ao original ({l.tom})
                                </button>
                              )}
                            </div>
                          )}

                          {/* Músicos */}
                          <div style={{fontSize:9,letterSpacing:1.5,color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",textTransform:"uppercase",marginBottom:8}}>Músicos nesta música</div>
                          <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:12}}>
                            {listaMus.map(mt=>{
                              const on=selMus.includes(mt.nome);
                              return(
                                <button key={mt.id} onClick={()=>toggleMusLouvor(mt.nome)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:9,border:on?"1px solid rgba(107,191,163,0.5)":"1px solid rgba(255,255,255,0.07)",background:on?"rgba(107,191,163,0.1)":"rgba(255,255,255,0.02)",cursor:"pointer",fontFamily:"inherit",textAlign:"left",transition:"all 0.15s"}}>
                                  <span className={emojiClass(mt.instrumento,mt.emoji)} style={{fontSize:18,display:"inline-block"}}>{mt.emoji}</span>
                                  <div style={{flex:1}}>
                                    <div style={{fontSize:12,fontWeight:600,color:on?"#6BBFA3":accent.text}}>{mt.nome}</div>
                                    <div style={{fontSize:10,color:getAccent().light_theme?"rgba(0,0,0,0.42)":"rgba(255,255,255,0.35)"}}>{mt.instrumento}</div>
                                  </div>
                                  <span style={{fontSize:14,color:on?"#6BBFA3":"rgba(255,255,255,0.2)",fontWeight:700}}>{on?"✓":"+"}</span>
                                </button>
                              );
                            })}
                          </div>
                          {escaladosCulto.length===0&&<div style={{fontSize:10,color:getAccent().light_theme?"rgba(0,0,0,0.30)":"rgba(255,255,255,0.2)",fontStyle:"italic",marginBottom:10}}>Escale músicos no culto para filtrar aqui</div>}

                          {/* Obs do louvor */}
                          {l.obs&&<div style={{fontSize:12,color:accent.light_theme?"rgba(0,0,0,0.55)":"rgba(255,255,255,0.5)",background:accent.light_theme?"rgba(0,0,0,0.04)":`rgba(${accent.rgb},0.06)`,border:`1px solid rgba(${accent.rgb},0.15)`,borderRadius:8,padding:"8px 10px",marginBottom:12,lineHeight:1.5}}>📝 {l.obs}</div>}

                          {/* Cifra Club link */}
                          <div style={{marginBottom:12}}>
                            <a href={"https://www.cifraclub.com.br/pesquisar/?q="+encodeURIComponent((l.titulo||"")+" "+(l.artista||""))} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:11,color:getAccent().light_theme?"rgba(0,0,0,0.50)":"rgba(255,255,255,0.45)",background:accent.light_theme?"rgba(0,0,0,0.03)":"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"5px 10px",textDecoration:"none",transition:"all 0.15s"}}>
                              🎸 Buscar cifra no Cifra Club
                            </a>
                          </div>
                          <div style={{display:"flex",gap:8,justifyContent:"flex-end",paddingRight:4}}>
                            <button onClick={()=>{setOpenLouvor(null);setTransposeMap(p=>({...p,[l.id]:l.tom}));}} style={{...bGhost,padding:"6px 14px",fontSize:12}}>Cancelar</button>
                            <button onClick={salvar} style={{...bGold,padding:"6px 16px",fontSize:12}}>Salvar ✓</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Form novo louvor */}
              {newLF&&(
                <div style={{background:accent.bgCard,border:`1px solid rgba(${accent.rgb},0.2)`,borderRadius:14,padding:16,marginBottom:12}}>

                  <Fld label="Título" value={newLF.titulo} onChange={e=>setNLF(p=>({...p,titulo:e.target.value}))} placeholder="Nome da música"/>

                  {/* Tom com optgroup */}
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:10,letterSpacing:1.5,color:getAccent().light_theme?"rgba(0,0,0,0.42)":"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:5}}>TOM</label>
                    <select value={newLF.tom} onChange={e=>setNLF(p=>({...p,tom:e.target.value}))} style={{width:"100%",background:accent.light_theme?"rgba(0,0,0,0.04)":"rgba(255,255,255,0.05)",border:accent.light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 13px",color:accent.text,fontSize:14,fontFamily:"inherit",outline:"none",marginBottom:0}}>
                      <option value="">— Selecionar tom —</option>
                      <optgroup label="── Maiores ──">
                        <option value="C">C (Dó Maior)</option>

                        <option value="E">E (Mi Maior)</option>
                        <option value="F">F (Fá Maior)</option>
                        <option value="F#">F# (Fá# Maior)</option>
                        <option value="Gb">Gb (Solb Maior)</option>
                        <option value="G">G (Sol Maior)</option>
                        <option value="G#">G# (Sol# Maior)</option>
                        <option value="Ab">Ab (Láb Maior)</option>
                        <option value="A">A (Lá Maior)</option>
                        <option value="A#">A# (Lá# Maior)</option>
                        <option value="Bb">Bb (Sib Maior)</option>
                        <option value="B">B (Si Maior)</option>
                      </optgroup>
                      <optgroup label="── Menores ──">
                        <option value="Cm">Cm (Dó Menor)</option>
                        <option value="C#m">C#m (Dó# Menor)</option>
                        <option value="Dbm">Dbm (Réb Menor)</option>
                        <option value="Dm">Dm (Ré Menor)</option>
                        <option value="D#m">D#m (Ré# Menor)</option>
                        <option value="Ebm">Ebm (Mib Menor)</option>
                        <option value="Em">Em (Mi Menor)</option>
                        <option value="Fm">Fm (Fá Menor)</option>
                        <option value="F#m">F#m (Fá# Menor)</option>
                        <option value="Gbm">Gbm (Solb Menor)</option>
                        <option value="Gm">Gm (Sol Menor)</option>
                        <option value="G#m">G#m (Sol# Menor)</option>
                        <option value="Abm">Abm (Láb Menor)</option>
                        <option value="Am">Am (Lá Menor)</option>
                        <option value="A#m">A#m (Lá# Menor)</option>
                        <option value="Bbm">Bbm (Sib Menor)</option>
                        <option value="Bm">Bm (Si Menor)</option>
                      </optgroup>
                    </select>
                  </div>

                  {/* Cantor */}
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:10,letterSpacing:1.5,color:getAccent().light_theme?"rgba(0,0,0,0.42)":"rgba(255,255,255,0.35)",textTransform:"uppercase",fontWeight:600,display:"block",marginBottom:5}}>CANTOR(A)</label>
                    <select value={newLF.cantor||""} onChange={e=>setNLF(p=>({...p,cantor:e.target.value}))} style={{width:"100%",background:accent.light_theme?"rgba(0,0,0,0.04)":"rgba(255,255,255,0.05)",border:accent.light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 13px",color:accent.text,fontSize:14,fontFamily:"inherit",outline:"none"}}>

                                <div style={{fontSize:9,letterSpacing:1,color:getAccent().light_theme?"rgba(0,0,0,0.30)":"rgba(255,255,255,0.25)",textTransform:"uppercase",marginBottom:4}}>Músicos</div>

                                  {musicos.map(mt=>{

                                  })}
                                </div>
                              </div>
                              <button onClick={()=>{setSelId(c.id);setTab("culto");}} style={{background:"none",border:"none",color:accent.accent,cursor:"pointer",fontSize:11,fontFamily:"inherit",padding:0}}>Ver detalhes →</button>
                            </div>
                          )}
                        </div>
                      );

                  </div>
                );

          </div>

        {tab==="buscar"&&(
          <div style={{animation:"fadeUp 0.3s ease"}}>

              <h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:28,fontWeight:700,color:getAccent().light_theme?"#1A1028":accent.text,margin:0}}>Buscar Louvores</h1>
            </div>
            <div style={{display:"flex",background:accent.bgCard,border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,overflow:"hidden",marginBottom:20}}>

            </div>
            {sErr&&<div style={{background:"rgba(224,123,138,0.08)",border:"1px solid rgba(224,123,138,0.25)",color:"#E07B8A",borderRadius:10,padding:"10px 15px",fontSize:13,marginBottom:16}}>{sErr}</div>}

              <>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{fontSize:10,letterSpacing:2,color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",textTransform:"uppercase",fontWeight:600}}>{sRes.length} resultados</div>

                  ))}

              </>

            <div style={{background:accent.bgCard,border:`1px solid rgba(${accent.rgb},0.25)`,borderRadius:14,padding:18}}>

                  <div style={{position:"relative",width:"100%",paddingBottom:"56.25%",background:"#000",borderRadius:10,overflow:"hidden",marginBottom:10}}>

                </div>
              )}
            </div>
          </div>
        )}

        {/* ══ FAVORITOS ══ */}
        {tab==="favoritos"&&(
          <div style={{animation:"fadeUp 0.3s ease"}}>
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,letterSpacing:2.5,color:accent.accent,textTransform:"uppercase",fontWeight:600,marginBottom:4}}>Minha lista</div>
              <h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:28,fontWeight:700,color:getAccent().light_theme?"#1A1028":accent.text,margin:0}}>Favoritos</h1>
            </div>
            {favs.length===0&&<p style={{color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",fontSize:14,fontStyle:"italic"}}>Nenhum favorito ainda. Busque músicas e marque com ★</p>}

              {favs.map(l=>(
                <LCard key={l.id} l={l} accent={accent} isFav={true} onFav={()=>toggleFav(l)} onPlay={setPlayL} onAdd={canEdit?()=>{ setNLF({...l,obs:""}); setTab("culto"); showToast("Selecione o culto e salve"); }:null}/>
              ))}
            </div>
          </div>
        )}

      {playL&&(
        <Ovl bg={accent.bgCard} border={`1px solid ${accent.border}`} onClose={()=>{setPlayL(null);setPlayerTranspose(0);}} wide>
          <MH title={playL.titulo||"Reproduzindo"} sub={playL.artista} onClose={()=>{setPlayL(null);setPlayerTranspose(0);}}/>

            <>
              <div style={{position:"relative",width:"100%",paddingBottom:"56.25%",background:"#000",borderRadius:"12px 12px 0 0",overflow:"hidden"}}>
                <iframe
                  src={"https://www.youtube.com/embed/"+getYTId(playL.ytUrl)+"?autoplay=1&rel=0&playsinline=1"}

                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"

                  style={{position:"absolute",inset:0,width:"100%",height:"100%",border:"none"}}

                  const novosCultos=cultos.map(cu=>({

                    louvores:cu.louvores.map(x=>x.id===playL.id?{...x,tom:playL.tom}:x)

                  fbSet("cultos",novosCultos);
                  setPlayerTranspose(0);
                  showToast("Tom salvo ✓");

                      <button onClick={()=>setPlayerTranspose(p=>p-1)} style={{background:accent.light_theme?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:getAccent().light_theme?"#1A1028":accent.text,borderRadius:12,width:52,height:52,fontSize:26,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <div style={{textAlign:"center",minWidth:90}}>
                        <div style={{fontSize:34,fontWeight:700,color:mudou?accent.accent:"rgba(255,255,255,0.5)",letterSpacing:1,lineHeight:1}}>
                          {mudou?sinal+playerTranspose:"0"}
                        </div>
                        <div style={{fontSize:10,color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",marginTop:4}}>
                          {mudou?(playerTranspose>0?"semitons acima":"semitons abaixo"):"tom original"}
                        </div>
                      </div>
                      <button onClick={()=>setPlayerTranspose(p=>p+1)} style={{background:accent.light_theme?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:getAccent().light_theme?"#1A1028":accent.text,borderRadius:12,width:52,height:52,fontSize:26,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                    {playL.tom&&(
                      <div style={{textAlign:"center",fontSize:11,color:accent.light_theme?"rgba(0,0,0,0.35)":"rgba(255,255,255,0.3)",marginBottom:10}}>

                      </div>
                    )}
                    {mudou&&(
                      <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                        <button onClick={()=>setPlayerTranspose(0)} style={{background:"none",border:"1px solid rgba(255,255,255,0.12)",color:accent.light_theme?"rgba(0,0,0,0.45)":"rgba(255,255,255,0.4)",borderRadius:10,padding:"6px 16px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>↺ Zerar</button>
                      </div>
                    )}
                  </div>
                );
              })()}

              <div style={{textAlign:"center",marginTop:10}}>
                <a href={playL.ytUrl} target="_blank" rel="noopener noreferrer" style={{color:accent.accent,fontSize:12,textDecoration:"none",background:accent.light_theme?"rgba(0,0,0,0.04)":"rgba(255,255,255,0.05)",padding:"6px 14px",borderRadius:20,border:accent.light_theme?"1px solid rgba(0,0,0,0.12)":"1px solid rgba(255,255,255,0.1)"}}>

                </a>
              </div>
            </>
          ):<p style={{color:accent.light_theme?"rgba(0,0,0,0.45)":"rgba(255,255,255,0.4)",textAlign:"center",padding:20}}>Link de vídeo não disponível</p>}
        </Ovl>
      )}

            <Fld label="Nº de semanas" as="select" value={newCF.repeticoes} onChange={e=>setNCF(p=>({...p,repeticoes:e.target.value}))}>

            <button style={bGhost} onClick={()=>setNCF(null)}>Cancelar</button>

        </Ovl>
      )}

      {/* Favoritos picker */}
      {showFavPk&&sel&&(
        <Ovl bg={accent.bgCard} border={`1px solid ${accent.border}`} onClose={()=>setFavPk(false)}>
          <MH title="Adicionar Favorito" onClose={()=>setFavPk(false)}/>
          {favs.length===0&&<p style={{color:getAccent().light_theme?"rgba(0,0,0,0.42)":"rgba(255,255,255,0.35)",fontSize:13}}>Nenhum favorito ainda.</p>}
          {favs.map(f=>(
            <div key={f.id} onClick={()=>{ doAddLouvor(sel.id,f); setFavPk(false); }} className="pill" style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",marginBottom:6,cursor:"pointer",background:accent.light_theme?"rgba(0,0,0,0.02)":"rgba(255,255,255,0.02)"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:getAccent().light_theme?"#1A1028":accent.text}}>{f.titulo}</div>
                <div style={{fontSize:11,color:accent.light_theme?"rgba(0,0,0,0.45)":"rgba(255,255,255,0.4)"}}>{f.artista}</div>
              </div>
              <TomTag tom={f.tom}/>
            </div>
          ))}
        </Ovl>
      )}

      {/* Editar cantor */}
      {editCI!==null&&cantores[editCI]&&(
        <Ovl bg={accent.bgCard} border={`1px solid ${accent.border}`} onClose={()=>setEditCI(null)}>
          <MH title="Editar Cantor" onClose={()=>setEditCI(null)}/>
          <CantorModal cantor={cantores[editCI]} idx={editCI} cultos={cultos} onSave={saveCantorEdit} onDelete={deleteCantorAt} onClose={()=>setEditCI(null)} accent={accent} bGold={bGold} bGhost={bGhost} bDanger={bDanger} soEmojiMode={!canEdit}/>
        </Ovl>
      )}

      {/* Adicionar cantor */}
      {showAddC&&(
        <Ovl bg={accent.bgCard} border={`1px solid ${accent.border}`} onClose={()=>setShowAddC(false)}>
          <MH title="Novo Cantor" onClose={()=>setShowAddC(false)}/>
          <Fld label="Nome" value={newCantN} placeholder="Nome do cantor" onChange={e=>setNewCantN(e.target.value)}/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button style={bGhost} onClick={()=>setShowAddC(false)}>Cancelar</button>
            <button style={bGold} onClick={()=>{ if(!newCantN.trim())return; setCantores(p=>[...p,mkCantor(newCantN.trim())]); setNewCantN(""); setShowAddC(false); showToast("Cantor adicionado ✓"); }}>Adicionar</button>
          </div>
        </Ovl>
      )}

      {/* Editar músico */}
      {editMI!==null&&musicos[editMI]&&(
        <Ovl bg={accent.bgCard} border={`1px solid ${accent.border}`} onClose={()=>setEditMI(null)}>
          <MH title="Editar Músico" onClose={()=>setEditMI(null)}/>
          <MusicoModal musico={musicos[editMI]} idx={editMI} onSave={saveMusicoEdit} onDelete={deleteMusicoAt} onClose={()=>setEditMI(null)} accent={accent} bGold={bGold} bGhost={bGhost} bDanger={bDanger} soEmojiMode={!canEdit}/>
        </Ovl>
      )}

      {/* Adicionar músico */}
      {showAddM&&(
        <Ovl bg={accent.bgCard} border={`1px solid ${accent.border}`} onClose={()=>setShowAddM(false)}>

            <button style={bGhost} onClick={()=>setShowAddM(false)}>Cancelar</button>

      {/* Tema */}
      {showTheme&&(
        <Ovl bg={accent.bgCard} border={`1px solid ${accent.border}`} onClose={()=>setShowTheme(false)}>
          <MH title="Tema" onClose={()=>setShowTheme(false)}/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8}}>
            {Object.entries(THEMES).map(([k,t])=>(
              <button key={k} onClick={()=>{setThemeKey(k);setShowTheme(false);}} style={{padding:0,borderRadius:14,border:themeKey===k?`2px solid ${t.accent}`:"1px solid rgba(255,255,255,0.1)",background:"transparent",cursor:"pointer",fontFamily:"inherit",overflow:"hidden",transition:"all 0.15s"}}>
                {/* Mini preview */}
                <div style={{background:t.bg,padding:"12px 10px 8px"}}>
                  <div style={{background:t.bgCard,borderRadius:8,padding:"8px 10px",marginBottom:6,border:`1px solid rgba(${t.rgb},0.3)`}}>
                    <div style={{fontSize:9,fontWeight:700,color:t.accent,letterSpacing:1,marginBottom:2}}>BANDA AVIVA</div>
                    <div style={{height:4,borderRadius:2,background:t.accent,width:"60%",marginBottom:4}}/>
                    <div style={{height:3,borderRadius:2,background:t.light_theme?"rgba(0,0,0,0.12)":"rgba(255,255,255,0.1)",width:"80%"}}/>
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    <div style={{flex:1,height:6,borderRadius:3,background:`rgba(${t.rgb},0.4)`}}/>
                    <div style={{flex:1,height:6,borderRadius:3,background:t.light_theme?"rgba(0,0,0,0.08)":"rgba(255,255,255,0.07)"}}/>
                  </div>
                </div>
                <div style={{background:t.bgCard,padding:"8px 10px",borderTop:`1px solid rgba(${t.rgb},0.15)`}}>
                  <div style={{fontSize:12,color:t.accent,fontWeight:700,textAlign:"center"}}>{t.name}</div>
                  {themeKey===k&&<div style={{fontSize:9,color:t.accent,textAlign:"center",opacity:0.7}}>✓ ativo</div>}
                </div>
              </button>
            ))}
          </div>
        </Ovl>
      )}

      {/* Toast */}
      {confirm&&<ConfirmModal msg={confirm.msg} onOk={()=>{confirm.onOk();setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}

      {toast&&(
        <div style={{position:"fixed",bottom:"calc(72px + env(safe-area-inset-bottom))",right:16,zIndex:9999,padding:"11px 18px",borderRadius:12,background:toast.ok?"rgba(76,175,125,0.97)":"rgba(224,123,138,0.97)",color:"#0F0F1A",fontWeight:700,fontSize:13,fontFamily:"inherit",boxShadow:"0 8px 28px rgba(0,0,0,0.5)",animation:"toastIn 0.25s ease"}}>
          {toast.msg}
        </div>
      )}

    </div>
  );
}

function App(){
  const [session,setSession]=useState(getSession);
  if(!session) return <TelaAcesso onOk={s=>setSession(s)}/>;
  return <AppMain session={session} setSession={setSession}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
  }
</script>
</body>
</html>
